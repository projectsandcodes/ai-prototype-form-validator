    <script>
  document.getElementById("form").onsubmit = async (e) => {
    e.preventDefault();
    output.textContent = ""; // clears old JSON

    const data = {
      name: name.value,
      email: email.value,
      message: message.value,
    };

    const res = await fetch("https://ai-prototype-form-validator.projectsandcodes.repl.co/validate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    const json = await res.json();
    output.textContent = JSON.stringify(json, null, 2);
  };
</script>
