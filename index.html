<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: sans-serif;
      background: #fafafa;
      padding: 40px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      padding: 10px 20px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
    }

    button:hover {
      background: #0d47a1;
    }

    pre {
      background: #f4f4f4;
      padding: 15px;
      border-radius: 4px;
    }

    .fade {
      animation: fadeIn 0.4s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Success checkmark animation */
    .checkmark {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid white;
      border-radius: 50%;
      position: relative;
      margin-right: 8px;
    }

    .checkmark::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 0px;
      width: 6px;
      height: 12px;
      border-right: 3px solid white;
      border-bottom: 3px solid white;
      transform: rotate(45deg);
    }


    /* Validation summary box */
    #summaryBox {
      display: none;
      background: #fff8e1;
      border-left: 4px solid #ffb300;
      padding: 10px;
      margin-top: 20px;
      border-radius: 4px;
      color: #795548;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2 style="margin-top:0;">AI-Assisted Form Validator</h2>
    <p style="color:#555; margin-bottom:20px;">
      A minimal prototype demonstrating server-side validation with real-time JSON feedback.
    </p>

    <form id="form">
      <label>Name</label>
      <input id="name" placeholder="Name">
      <div id="nameError" style="color:#f44336; font-size:14px;"></div>

      <label>Email</label>
      <input id="email" placeholder="Email">
      <div id="emailError" style="color:#f44336; font-size:14px;"></div>

      <label>Message</label>
      <textarea id="message" placeholder="Message" style="height:120px;"></textarea>
      <div id="messageError" style="color:#f44336; font-size:14px;"></div>

      <button type="submit">Validate</button>
      <button type="button" id="resetBtn" style="background:#9e9e9e;">Reset</button>
    </form>

    <h3>Validation Result</h3>

    <!-- Success Banner -->
    <div id="successBanner" class="fade" 
         style="display:none; background:#4caf50; color:white; padding:10px; border-radius:4px; margin-top:20px;">
      <span class="checkmark"></span>
      ✔ Success! Your form is valid.
    </div>

    <!-- Error Banner -->
    <div id="errorBanner" class="fade" 
         style="display:none; background:#f44336; color:white; padding:10px; border-radius:4px; margin-top:20px;">
      ✖ Validation failed. Please correct the errors below.
    </div>

    <!-- Validation Summary -->
    <div id="summaryBox"></div>

    <pre id="output"></pre>

    <p style="margin-top:30px; font-size:14px; color:#888; text-align:center;">
      Built by Pradeep • 
      <a href="https://github.com/projectsandcodes" style="color:#555;">GitHub</a> • 
      <a href="https://medium.com/@shinealldaylong.blogspot.com" style="color:#555;">Medium</a>
    </p>
  </div>

<script>
  const formEl = document.getElementById("form");
  const outputEl = document.getElementById("output");
  const successBanner = document.getElementById("successBanner");
  const errorBanner = document.getElementById("errorBanner");
  const summaryBox = document.getElementById("summaryBox");

  const resetBtn = document.getElementById("resetBtn");

  // Reset button logic
  resetBtn.onclick = () => {
    formEl.reset();
    outputEl.textContent = "";
    successBanner.style.display = "none";
    errorBanner.style.display = "none";
    summaryBox.style.display = "none";
    document.getElementById("nameError").textContent = "";
    document.getElementById("emailError").textContent = "";
    document.getElementById("messageError").textContent = "";
  };

  formEl.onsubmit = async (e) => {
    e.preventDefault();

    // Clear UI
    outputEl.textContent = "";
    successBanner.style.display = "none";
    errorBanner.style.display = "none";
    summaryBox.style.display = "none";

    document.getElementById("nameError").textContent = "";
    document.getElementById("emailError").textContent = "";
    document.getElementById("messageError").textContent = "";

    const data = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      message: document.getElementById("message").value,
    };

    const res = await fetch("/validate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data),
    });

    const json = await res.json();

    // Inline errors
    if (!json.valid) {
      json.issues.forEach(issue => {
        if (issue.includes("Name")) document.getElementById("nameError").textContent = issue;
        if (issue.includes("Email")) document.getElementById("emailError").textContent = issue;
        if (issue.includes("Message")) document.getElementById("messageError").textContent = issue;
      });

      // Validation summary
      summaryBox.style.display = "block";
      summaryBox.innerHTML = "<strong>Summary:</strong><br>" + json.issues.join("<br>");
    }

    // Show correct banner
    if (json.valid) {
      successBanner.style.display = "block";
    } else {
      errorBanner.style.display = "block";
    }

    // JSON output
    outputEl.style.border = json.valid
      ? "2px solid #4caf50"
      : "2px solid #f44336";

    outputEl.textContent = JSON.stringify(json, null, 2);
  };
</script>

</body>
</html>
